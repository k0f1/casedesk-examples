apiVersion: v1
kind: Namespace
metadata:
  name: ai-inference
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama
  namespace: ai-inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llama
  template:
    metadata:
      labels:
        app: llama
    spec:
      initContainers:
        - name: pull-model
          image: ollama/ollama:latest
          command: ["ollama", "pull", "llama3.2:3b"]
          env:
            - name: OLLAMA_HOST
              value: "http://localhost:11434"
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          env:
            - name: OLLAMA_MODEL
              value: "llama3.2:3b"
          resources:
            limits:
              nvidia.com/gpu: 1
              memory: "16Gi"
            requests:
              nvidia.com/gpu: 1
              memory: "8Gi"
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: ollama-data
          emptyDir: {}
      tolerations:
        - key: sku
          operator: Equal
          value: gpu
          effect: NoSchedule
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      nodeSelector:
        agentpool: gpunodes
---
apiVersion: v1
kind: Service
metadata:
  name: llama
  namespace: ai-inference
spec:
  selector:
    app: llama
  ports:
    - port: 11434
      targetPort: 11434
