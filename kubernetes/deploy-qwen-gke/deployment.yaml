apiVersion: v1
kind: Namespace
metadata:
  name: ai-inference
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen
  namespace: ai-inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qwen
  template:
    metadata:
      labels:
        app: qwen
    spec:
      initContainers:
        - name: pull-model
          image: ollama/ollama:latest
          command: ["ollama", "pull", "qwen2.5:7b"]
          env:
            - name: OLLAMA_HOST
              value: "http://localhost:11434"
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          env:
            - name: OLLAMA_MODEL
              value: "qwen2.5:7b"
          resources:
            limits:
              nvidia.com/gpu: 1
              memory: "16Gi"
            requests:
              nvidia.com/gpu: 1
              memory: "8Gi"
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: ollama-data
          emptyDir: {}
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: present
          effect: NoSchedule
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-tesla-t4
---
apiVersion: v1
kind: Service
metadata:
  name: qwen
  namespace: ai-inference
spec:
  selector:
    app: qwen
  ports:
    - port: 11434
      targetPort: 11434
